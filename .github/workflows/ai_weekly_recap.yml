name: AI Weekly Recap

# IST = UTC + 5:30
# Sunday 8:00 PM IST → Sunday 14:30 UTC
on:
  schedule:
    - cron: "30 14 * * 0"   # Sunday 8:00 PM IST
  workflow_dispatch:         # Manual trigger from GitHub Actions UI

jobs:
  send-weekly-recap:
    name: Build & send weekly recap email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install feedparser pytz

      - name: Run Weekly Recap
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
        run: python scripts/ai_weekly_recap.py
