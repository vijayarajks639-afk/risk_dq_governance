name: AI News Digest

# IST = UTC + 5:30
# 6:00 AM IST  → 00:30 UTC  (Mon–Sat only)
# 9:00 AM IST  → 03:30 UTC  (Sunday only — leisurely morning read before weekly recap)
# 10:00 PM IST → 16:30 UTC  (every day)
on:
  schedule:
    - cron: "30 0 * * 1-6"  # 6:00 AM IST  Mon–Sat
    - cron: "30 3 * * 0"    # 9:00 AM IST  Sunday only
    - cron: "30 16 * * *"   # 10:00 PM IST daily
  workflow_dispatch:         # Manual "Run now" trigger from GitHub Actions UI

# ── SCHEDULE CONTROL ──────────────────────────────────────────────────────────
# Sunday runs at 9 AM IST (not 6 AM) so you get a relaxed morning read.
# The weekly recap still goes out at 8 PM IST Sunday evening — no conflict.
#
# To throttle to once-daily without touching cron lines, set the DIGEST_MODE secret:
#   DIGEST_MODE = "both"    → send morning + 10 PM IST (default)
#   DIGEST_MODE = "morning" → send only the morning edition (10 PM run exits silently)
#   DIGEST_MODE = "evening" → send only 10 PM IST (morning run exits silently)
# To pause entirely, comment out the three cron lines above (workflow_dispatch still works).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  send-digest:
    name: Fetch AI news & send email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install feedparser pytz anthropic

      - name: Run AI News Digest
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          # Set DIGEST_MODE secret to "morning" or "evening" to go once-daily.
          # Leave unset (or set to "both") for the default twice-daily schedule.
          DIGEST_MODE:        ${{ secrets.DIGEST_MODE }}
          # YouTube Data API v3 key — add as secret YOUTUBE_API_KEY to enable Section 9.
          # Free tier: 10,000 quota units/day (each search = 100 units; ~98 searches/day headroom).
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          # Optional: set ANTHROPIC_API_KEY secret to add an AI-written "Editor's Brief".
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_news_digest.py
