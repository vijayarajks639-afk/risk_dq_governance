name: AI News Digest

# IST = UTC + 5:30
# 6:00 AM IST  → 00:30 UTC
# 10:00 PM IST → 16:30 UTC
on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST
    - cron: "30 16 * * *"  # 10:00 PM IST
  workflow_dispatch:        # Manual "Run now" trigger from GitHub Actions UI

jobs:
  send-digest:
    name: Fetch AI news & send email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install feedparser pytz

      - name: Run AI News Digest
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
        run: python scripts/ai_news_digest.py
