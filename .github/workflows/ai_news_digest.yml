name: AI News Digest

# IST = UTC + 5:30
# 6:00 AM IST → 00:30 UTC  (every day)
on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST daily
  workflow_dispatch:        # Manual "Run now" trigger from GitHub Actions UI

# ── SCHEDULE CONTROL ──────────────────────────────────────────────────────────
# Single daily run at 6:00 AM IST.  The Sunday Weekly Recap goes at 8 PM IST
# from a separate workflow (ai_weekly_recap.yml) — no conflict.
#
# To pause entirely: comment out the cron line above (workflow_dispatch still works).
# To skip a single run: set DIGEST_MODE secret to "off" and the script exits silently.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  send-digest:
    name: Fetch AI news & send email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install feedparser pytz anthropic

      - name: Run AI News Digest
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          # Set DIGEST_MODE secret to "morning" or "evening" to go once-daily.
          # Leave unset (or set to "both") for the default twice-daily schedule.
          DIGEST_MODE:        ${{ secrets.DIGEST_MODE }}
          # YouTube Data API v3 key — add as secret YOUTUBE_API_KEY to enable Section 9.
          # Free tier: 10,000 quota units/day (each search = 100 units; ~98 searches/day headroom).
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          # Optional: set ANTHROPIC_API_KEY secret to add an AI-written "Editor's Brief".
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ai_news_digest.py
